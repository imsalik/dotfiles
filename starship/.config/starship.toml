"$schema" = 'https://starship.rs/config-schema.json'

# General prompt format with new line and reordered status
# A minimal left prompt
format = """
$os\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$fill\
$time\
$line_break\
$character"""
palette = "catppuccin_mocha"

# Add the fill and line break modules
[fill]
symbol = " "

# General styling and symbols
[character]
success_symbol = "[➜](bold green)"  # Arrow symbol for success
error_symbol = "[➜](bold red)"      # Arrow symbol for error
vimcmd_symbol = "[➜](bold green)"   # Arrow for vim command mode

# Directory configuration
[directory]
style = "blue bold"
read_only = " "
truncation_length = 4
truncate_to_repo = true

# Git configurations
[git_branch]
symbol = " "
style = "bright-green"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
renamed = "  "
deleted = " 﫧"
stashed = "  "
modified = "  "
untracked = "  "
staged = " + "
conflicted = "  "
up_to_date = " ✓ "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# Language configurations
[python]
symbol = " "
style = "bold yellow"

[os]
disabled = false
style = "bold blue"
symbols.Ubuntu = " "

[time]
disabled = false
format = '[ 󱑍 $time](bold purple) '
time_format = '%I:%M %p'
style = "bold purple"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"